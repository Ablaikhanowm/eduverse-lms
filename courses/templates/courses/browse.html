{% extends 'courses/base.html' %}

{% block title %}Browse Courses{% endblock %}

{% block content %}
<div id="react-app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

{% verbatim %}
<script type="text/babel">
const { useState, useEffect } = React;

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function App() {
    const [view, setView] = useState('courses');
    const [courses, setCourses] = useState([]);
    const [selectedCourse, setSelectedCourse] = useState(null);
    const [selectedLesson, setSelectedLesson] = useState(null);
    const [searchTerm, setSearchTerm] = useState('');
    const [loading, setLoading] = useState(true);
    const [message, setMessage] = useState('');
    const [userInfo, setUserInfo] = useState(null);

    useEffect(() => {
        fetchCourses();
        fetchUserInfo();
    }, []);

    const fetchUserInfo = async () => {
        const res = await fetch('/api/user/');
        const data = await res.json();
        setUserInfo(data);
    };

    const fetchCourses = async (search = '') => {
        setLoading(true);
        const res = await fetch(`/api/courses/?search=${search}`);
        const data = await res.json();
        setCourses(data);
        setLoading(false);
    };

    const fetchCourseDetail = async (courseId) => {
        setLoading(true);
        const res = await fetch(`/api/courses/${courseId}/`);
        const data = await res.json();
        setSelectedCourse(data);
        setView('courseDetail');
        setLoading(false);
    };

    const fetchLessonDetail = async (lessonId) => {
        setLoading(true);
        const res = await fetch(`/api/lessons/${lessonId}/`);
        const data = await res.json();
        setSelectedLesson(data);
        setView('lessonDetail');
        setLoading(false);
    };

    const handleEnroll = async (courseId) => {
        const res = await fetch(`/api/courses/${courseId}/enroll/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json',
            },
        });
        const data = await res.json();
        setMessage(data.message);
        fetchCourseDetail(courseId);
        setTimeout(() => setMessage(''), 3000);
    };

    const handleQuizSubmit = async (quizId, answer) => {
        const res = await fetch(`/api/quiz/${quizId}/submit/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ answer }),
        });
        const data = await res.json();
        setMessage(data.message);
        setTimeout(() => setMessage(''), 3000);
    };

    const handleSearch = (e) => {
        e.preventDefault();
        fetchCourses(searchTerm);
    };

    if (loading && view === 'courses') {
        return <div className="text-center mt-5"><div className="spinner-border" role="status"></div></div>;
    }

    return (
        <div>
            {message && <div className={`alert ${message.includes('Correct') || message.includes('Enrolled') ? 'alert-success' : 'alert-warning'}`}>{message}</div>}

            {view === 'courses' && (
                <div>
                    <div className="d-flex justify-content-between align-items-center mb-4">
                        <h2>Browse Courses</h2>
                        {userInfo && <span className="badge bg-primary">{userInfo.role}</span>}
                    </div>

                    <form onSubmit={handleSearch} className="mb-4">
                        <div className="input-group">
                            <input
                                type="text"
                                className="form-control"
                                placeholder="Search courses..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <button className="btn btn-primary" type="submit">Search</button>
                            {searchTerm && (
                                <button className="btn btn-outline-secondary" type="button"
                                    onClick={() => { setSearchTerm(''); fetchCourses(); }}>
                                    Clear
                                </button>
                            )}
                        </div>
                    </form>

                    <div className="row">
                        {courses.map(course => (
                            <div key={course.id} className="col-md-4 mb-4">
                                <div className="card h-100 shadow-sm">
                                    {course.thumbnail && (
                                        <img src={course.thumbnail} className="card-img-top" alt={course.title}
                                            style={{height: '200px', objectFit: 'cover'}} />
                                    )}
                                    <div className="card-body d-flex flex-column">
                                        <h5 className="card-title">{course.title}</h5>
                                        <p className="text-muted small">by {course.instructor_name}</p>
                                        <p className="card-text">{course.description.substring(0, 100)}...</p>
                                        <div className="mt-auto d-flex justify-content-between align-items-center">
                                            <span className="badge bg-secondary">{course.lesson_count} lessons</span>
                                            <button className="btn btn-primary btn-sm"
                                                onClick={() => fetchCourseDetail(course.id)}>
                                                View Course
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {courses.length === 0 && <p className="text-muted">No courses found.</p>}
                    </div>
                </div>
            )}

            {view === 'courseDetail' && selectedCourse && (
                <div>
                    <button className="btn btn-outline-secondary mb-3" onClick={() => { setView('courses'); fetchCourses(); }}>
                        &larr; Back to Courses
                    </button>

                    <div className="row">
                        <div className="col-md-8">
                            <h2>{selectedCourse.title}</h2>
                            <p className="text-muted">by {selectedCourse.instructor_name}</p>
                            <p>{selectedCourse.description}</p>

                            {selectedCourse.thumbnail && (
                                <img src={selectedCourse.thumbnail} className="img-fluid rounded mb-3"
                                    style={{maxHeight: '300px'}} alt={selectedCourse.title} />
                            )}

                            {!selectedCourse.is_enrolled && userInfo && userInfo.role === 'student' && (
                                <button className="btn btn-success mb-3" onClick={() => handleEnroll(selectedCourse.id)}>
                                    Enroll in this Course
                                </button>
                            )}
                            {selectedCourse.is_enrolled && <span className="badge bg-success mb-3 d-inline-block">Enrolled</span>}

                            <h4 className="mt-4">Lessons ({selectedCourse.lessons.length})</h4>
                            <div className="list-group">
                                {selectedCourse.lessons.map(lesson => (
                                    <button key={lesson.id} className="list-group-item list-group-item-action"
                                        onClick={() => fetchLessonDetail(lesson.id)}>
                                        <strong>{lesson.order}.</strong> {lesson.title}
                                    </button>
                                ))}
                                {selectedCourse.lessons.length === 0 && <p className="text-muted mt-2">No lessons yet.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {view === 'lessonDetail' && selectedLesson && (
                <div>
                    <button className="btn btn-outline-secondary mb-3"
                        onClick={() => fetchCourseDetail(selectedLesson.course_id)}>
                        &larr; Back to {selectedLesson.course_title}
                    </button>

                    <h2>{selectedLesson.title}</h2>
                    <div className="card mb-4">
                        <div className="card-body">
                            <p>{selectedLesson.content}</p>
                            {selectedLesson.file && (
                                <a href={selectedLesson.file} className="btn btn-sm btn-outline-secondary" download>
                                    Download Attachment
                                </a>
                            )}
                        </div>
                    </div>

                    <h4>Quizzes</h4>
                    {selectedLesson.quizzes.map(quiz => (
                        <QuizCard key={quiz.id} quiz={quiz} onSubmit={handleQuizSubmit} />
                    ))}
                    {selectedLesson.quizzes.length === 0 && <p className="text-muted">No quizzes for this lesson.</p>}
                </div>
            )}
        </div>
    );
}

function QuizCard({ quiz, onSubmit }) {
    const [selected, setSelected] = useState('');
    const [submitted, setSubmitted] = useState(false);

    const handleSubmit = () => {
        if (selected) {
            onSubmit(quiz.id, selected);
            setSubmitted(true);
        }
    };

    return (
        <div className="card mb-3">
            <div className="card-body">
                <h5>{quiz.question}</h5>
                {['A', 'B', 'C', 'D'].map(option => (
                    <div key={option} className="form-check mb-2">
                        <input className="form-check-input" type="radio" name={`quiz-${quiz.id}`}
                            value={option} id={`q${quiz.id}-${option}`}
                            onChange={() => setSelected(option)} disabled={submitted} />
                        <label className="form-check-label" htmlFor={`q${quiz.id}-${option}`}>
                            {option}) {quiz[`option_${option.toLowerCase()}`]}
                        </label>
                    </div>
                ))}
                {!submitted && (
                    <button className="btn btn-primary mt-2" onClick={handleSubmit} disabled={!selected}>
                        Submit Answer
                    </button>
                )}
                {submitted && <span className="badge bg-info mt-2">Answer submitted!</span>}
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('react-app')).render(<App />);
</script>
{% endverbatim %}
{% endblock %}
